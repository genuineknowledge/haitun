<!DOCTYPE html>
<html lang="{{ .Site.Language.Locale | default "zh-CN" }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .Site.Title }} · {{ .Site.Params.tagline }}</title>
  <meta name="description" content="{{ .Site.Params.description }}">
  <link rel="icon" href="{{ "favicon.ico" | relURL }}" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  {{ $style := resources.Get "css/main.css" | resources.Minify }}
  <link rel="stylesheet" href="{{ $style.RelPermalink }}">
  <style>
    /* ========== 导航布局 ========== */
    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }
    header .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: default;
      flex-shrink: 0;
    }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 32px;
    }
    .footer .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: default;
    }

    /* ========== 核心修复：强制解除 Hero 区域裁切 ========== */
    .hero,
    .hero-inner,
    .hero-cta,
    .hero-glow {
      overflow: visible !important;
    }

    /* ========== 重写：下载下拉菜单 ========== */
    .download-dropdown {
      position: relative;
      display: inline-block;
      z-index: 99999 !important;
    }

    .download-dropdown-menu {
      position: absolute;
      top: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      min-width: 320px;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.15);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: all 0.2s ease;
      z-index: 99999 !important;
      overflow: hidden;
    }

    .download-dropdown:hover .download-dropdown-menu {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .download-option {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      color: #1f2937;
      text-decoration: none;
      font-size: 15px;
      line-height: 1.4;
      transition: background 0.15s;
      border: none;
      width: 100%;
      box-sizing: border-box;
      text-align: left;
    }

    .download-option:hover {
      background: #f3f4f6;
    }

    .download-option.current {
      color: #2588f0;
      font-weight: 600;
    }

    .download-option .badge {
      flex-shrink: 0;
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 6px;
      background: #e6f0ff;
      color: #2588f0;
      margin-left: 16px;
      font-weight: 500;
    }

    /* ========== 下载专区三卡片 ========== */
    .download-grid {
      display: grid;
      grid-template-columns: 1fr 1.2fr 1fr;
      gap: 24px;
      margin-top: 40px;
      align-items: stretch;
    }
    .download-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 32px 24px;
      text-align: center;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .download-card:hover {
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      transform: translateY(-2px);
    }
    .download-card.featured {
      border-color: #2588f0;
      box-shadow: 0 4px 16px rgba(37, 136, 240, 0.15);
    }
    .download-card-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    .download-card h3 {
      font-size: 24px;
      margin: 0 0 8px;
      color: #1f2937;
    }
    .download-card .system-note {
      color: #6b7280;
      font-size: 14px;
      margin-bottom: 24px;
    }
    .download-card .btn {
      width: 100%;
      justify-content: center;
    }

    /* ========== 紧凑三步流程 ========== */
    .steps-compact {
      display: flex;
      gap: 32px;
      margin-bottom: 32px;
    }
    .step-compact {
      flex: 1;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .step-compact-num {
      flex-shrink: 0;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, #2588f0, #6b5cff);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      margin-top: 2px;
    }
    .step-compact h4 {
      margin: 0 0 4px;
      font-size: 16px;
      color: #1f2937;
    }
    .step-compact p {
      margin: 0;
      font-size: 13px;
      line-height: 1.5;
      color: #6b7280;
    }

    /* ========== 暗色模式完整适配 ========== */
    body:not([data-theme="light"]) .download-dropdown-menu {
      background: #1f2937;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.5);
      border: 1px solid #374151;
    }
    body:not([data-theme="light"]) .download-option {
      color: #e5e7eb;
    }
    body:not([data-theme="light"]) .download-option:hover {
      background: #374151;
    }
    body:not([data-theme="light"]) .download-option.current {
      color: #60a5fa;
    }
    body:not([data-theme="light"]) .download-option .badge {
      background: #1e3a5f;
      color: #60a5fa;
    }

    body:not([data-theme="light"]) .download-card {
      background: #1f2937;
      border-color: #374151;
    }
    body:not([data-theme="light"]) .download-card.featured {
      border-color: #3b82f6;
      box-shadow: 0 4px 16px rgba(59, 130, 246, 0.2);
    }
    body:not([data-theme="light"]) .download-card h3 {
      color: #f9fafb;
    }
    body:not([data-theme="light"]) .download-card .system-note {
      color: #9ca3af;
    }

    body:not([data-theme="light"]) .step-compact h4 {
      color: #f9fafb;
    }
    body:not([data-theme="light"]) .step-compact p {
      color: #9ca3af;
    }

    /* ========== 响应式 ========== */
    @media (max-width: 900px) {
      .download-grid {
        grid-template-columns: 1fr;
      }
      .steps-compact {
        flex-direction: column;
        gap: 16px;
      }
    }
  </style>
</head>
<body>
  <header class="nav">
    <div class="container nav-inner">
      <div class="logo">
        <img class="logo-mark" src="{{ "logo.png" | relURL }}" alt="{{ .Site.Params.brand }}">
        <span class="logo-text">{{ .Site.Params.brand }}</span>
      </div>
      <nav class="nav-links">
        <a href="#features">功能</a>
        <a href="#requirements">配置要求</a>
        <a href="#faq">常见问题</a>
        <button id="themeToggle" class="theme-toggle" aria-label="切换明暗主题">
          <span class="icon-sun">☀️</span>
          <span class="icon-moon">🌙</span>
        </button>
        <a class="btn btn-sm" href="#download">下载</a>
      </nav>
    </div>
  </header>

  <main>
    {{ block "main" . }}{{ end }}
  </main>

  <footer class="footer">
    <div class="container footer-inner">
      <div>
        <div class="logo">
          <img class="logo-mark" src="{{ "logo.png" | relURL }}" alt="{{ .Site.Params.brand }}">
          <span class="logo-text">{{ .Site.Params.brand }}</span>
        </div>
        <p class="muted">{{ .Site.Params.description }}</p>
      </div>
      <div class="footer-links">
        <a href="https://github.com/genuineknowledge/psi-agent" target="_blank">GitHub</a>
        <a href="http://www.genuine-knowledge.com/" target="_blank">联系我们</a>
      </div>
    </div>
    <div class="container muted copyright">© {{ .Site.Params.year }} 合肥真知人工智能应用软件有限公司 保留所有权利。</div>
  </footer>

  <script>
    // 终端命令切换 + 一键复制
document.addEventListener('DOMContentLoaded', () => {
  const tabs = document.querySelectorAll('.terminal-tab');
  const commandEl = document.getElementById('terminal-command');
  const copyBtn = document.getElementById('copyCommandBtn');

  // 切换系统标签
  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      tabs.forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      commandEl.textContent = tab.dataset.cmd;
    });
  });

  // 一键复制命令
  copyBtn.addEventListener('click', async () => {
    try {
      await navigator.clipboard.writeText(commandEl.textContent);
      const originalIcon = copyBtn.innerHTML;
      copyBtn.innerHTML = '<span style="font-size:12px;">已复制</span>';
      setTimeout(() => {
        copyBtn.innerHTML = originalIcon;
      }, 1500);
    } catch (err) {
      console.error('复制失败', err);
    }
  });
});
    // 主题切换
    const themeToggle = document.getElementById('themeToggle');
    const savedTheme = localStorage.getItem('haitun-theme');
    if (savedTheme === 'light') {
      document.body.setAttribute('data-theme', 'light');
    }
    themeToggle.addEventListener('click', () => {
      const currentTheme = document.body.getAttribute('data-theme');
      if (currentTheme === 'light') {
        document.body.removeAttribute('data-theme');
        localStorage.setItem('haitun-theme', 'dark');
      } else {
        document.body.setAttribute('data-theme', 'light');
        localStorage.setItem('haitun-theme', 'light');
      }
    });

    // 系统识别（更严谨的判断顺序）
    function detectOS() {
      const ua = navigator.userAgent.toLowerCase();
      if (/windows win/.test(ua)) return 'windows';
      if (/mac os macintosh/.test(ua)) return 'mac';
      if (/linux x11 ubuntu debian fedora/.test(ua)) return 'linux';
      return 'windows';
    }

    document.addEventListener('DOMContentLoaded', () => {
      const os = detectOS();

      // 给对应选项加「当前设备」标记
      document.querySelectorAll('.download-option').forEach(el => {
        if (el.dataset.os === os) {
          el.classList.add('current');
          const badge = document.createElement('span');
          badge.className = 'badge';
          badge.textContent = '当前设备';
          el.appendChild(badge);
        }
      });

      // Hero 主按钮点击：自动跳转到对应系统下载
      const heroDownloadBtn = document.getElementById('hero-download-main');
      if (heroDownloadBtn) {
        heroDownloadBtn.addEventListener('click', (e) => {
          e.preventDefault();
          const target = document.querySelector(`.download-option[data-os="${os}"]`);
          if (target) {
            window.open(target.href, '_blank');
          }
        });
      }
    });
  </script>
</body>
</html>
