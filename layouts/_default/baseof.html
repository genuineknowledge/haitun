<!DOCTYPE html>
<html lang="{{ .Site.Language.Locale | default "zh-CN" }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .Site.Title }} · {{ .Site.Params.tagline }}</title>
  <meta name="description" content="{{ .Site.Params.description }}">
  <link rel="icon" href="{{ "favicon.ico" | relURL }}" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  {{ $style := resources.Get "css/main.css" | resources.Minify }}
  <link rel="stylesheet" href="{{ $style.RelPermalink }}">
  <style>
    /* 导航布局 */
    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }
    header .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: default;
      flex-shrink: 0;
    }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 32px;
    }
    /* 页脚logo */
    .footer .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: default;
    }

    /* Hero下载按钮下拉样式 */
    .download-dropdown {
      position: relative;
      display: inline-block;
      z-index: 9999;
    }
    .download-dropdown-menu {
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%) translateY(-4px);
      margin-top: 8px;
      min-width: 320px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      opacity: 0;
      visibility: hidden;
      transition: all 0.2s ease;
      z-index: 9999;
      overflow: hidden;
    }
    .download-dropdown:hover .download-dropdown-menu {
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%) translateY(0);
    }
    .download-option {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      cursor: pointer;
      color: #1f2937;
      text-decoration: none;
      font-size: 15px;
      transition: background 0.15s;
      line-height: 1.4;
      min-height: 48px;
    }
    .download-option:hover {
      background: #f3f4f6;
    }
    .download-option.current {
      color: #2588f0;
      font-weight: 500;
    }
    .download-option .badge {
      flex-shrink: 0;
      font-size: 12px;
      padding: 3px 8px;
      border-radius: 6px;
      background: #e6f0ff;
      color: #2588f0;
      margin-left: 12px;
    }

    /* 下载专区三卡片布局 */
    .download-grid {
      display: grid;
      grid-template-columns: 1fr 1.2fr 1fr;
      gap: 24px;
      margin-top: 40px;
      align-items: stretch;
    }
    .download-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 32px 24px;
      text-align: center;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .download-card:hover {
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      transform: translateY(-2px);
    }
    .download-card.featured {
      border-color: #2588f0;
      box-shadow: 0 4px 16px rgba(37, 136, 240, 0.15);
    }
    .download-card-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    .download-card h3 {
      font-size: 24px;
      margin: 0 0 8px;
      color: #1f2937;
    }
    .download-card .system-note {
      color: #6b7280;
      font-size: 14px;
      margin-bottom: 24px;
    }
    .download-card .btn {
      width: 100%;
      justify-content: center;
    }

    /* 紧凑三步流程 */
    .steps-compact {
      display: flex;
      gap: 32px;
      margin-bottom: 32px;
    }
    .step-compact {
      flex: 1;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .step-compact-num {
      flex-shrink: 0;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, #2588f0, #6b5cff);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      margin-top: 2px;
    }
    .step-compact h4 {
      margin: 0 0 4px;
      font-size: 16px;
      color: #1f2937;
    }
    .step-compact p {
      margin: 0;
      font-size: 13px;
      line-height: 1.5;
      color: #6b7280;
    }

    /* ========== 暗色模式适配 ========== */
    body:not([data-theme="light"]) .download-dropdown-menu {
      background: #1f2937;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    body:not([data-theme="light"]) .download-option {
      color: #e5e7eb;
    }
    body:not([data-theme="light"]) .download-option:hover {
      background: #374151;
    }
    body:not([data-theme="light"]) .download-option .badge {
      background: #1e3a5f;
      color: #60a5fa;
    }

    body:not([data-theme="light"]) .download-card {
      background: #1f2937;
      border-color: #374151;
    }
    body:not([data-theme="light"]) .download-card.featured {
      border-color: #3b82f6;
      box-shadow: 0 4px 16px rgba(59, 130, 246, 0.2);
    }
    body:not([data-theme="light"]) .download-card h3 {
      color: #f9fafb;
    }
    body:not([data-theme="light"]) .download-card .system-note {
      color: #9ca3af;
    }

    body:not([data-theme="light"]) .step-compact h4 {
      color: #f9fafb;
    }
    body:not([data-theme="light"]) .step-compact p {
      color: #9ca3af;
    }

    /* 响应式适配 */
    @media (max-width: 900px) {
      .download-grid {
        grid-template-columns: 1fr;
      }
      .steps-compact {
        flex-direction: column;
        gap: 16px;
      }
    }
  </style>
</head>
<body>
  <header class="nav">
    <div class="container nav-inner">
      <!-- 顶部Logo：无跳转 -->
      <div class="logo">
        <img class="logo-mark" src="{{ "logo.png" | relURL }}" alt="{{ .Site.Params.brand }}">
        <span class="logo-text">{{ .Site.Params.brand }}</span>
      </div>
      <nav class="nav-links">
        <a href="#features">功能</a>
        <a href="#requirements">配置要求</a>
        <a href="#faq">常见问题</a>
        <!-- 主题切换按钮 -->
        <button id="themeToggle" class="theme-toggle" aria-label="切换明暗主题">
          <span class="icon-sun">☀️</span>
          <span class="icon-moon">🌙</span>
        </button>
        <!-- 右上角下载：跳转到页面下载专区 -->
        <a class="btn btn-sm" href="#download">下载</a>
      </nav>
    </div>
  </header>

  <main>
    {{ block "main" . }}{{ end }}
  </main>

  <footer class="footer">
    <div class="container footer-inner">
      <div>
        <!-- 页脚Logo：无跳转 -->
        <div class="logo">
          <img class="logo-mark" src="{{ "logo.png" | relURL }}" alt="{{ .Site.Params.brand }}">
          <span class="logo-text">{{ .Site.Params.brand }}</span>
        </div>
        <p class="muted">{{ .Site.Params.description }}</p>
      </div>
      <div class="footer-links">
        <a href="https://github.com/genuineknowledge/psi-agent" target="_blank">GitHub</a>
        <a href="http://www.genuine-knowledge.com/" target="_blank">联系我们</a>
      </div>
    </div>
    <div class="container muted copyright">© {{ .Site.Params.year }} 合肥真知人工智能应用软件有限公司 保留所有权利。</div>
  </footer>

  <!-- 主题切换脚本 -->
  <script>
    const themeToggle = document.getElementById('themeToggle');
    const savedTheme = localStorage.getItem('haitun-theme');
    
    // 初始化主题
    if (savedTheme === 'light') {
      document.body.setAttribute('data-theme', 'light');
    }

    // 点击切换
    themeToggle.addEventListener('click', () => {
      const currentTheme = document.body.getAttribute('data-theme');
      if (currentTheme === 'light') {
        document.body.removeAttribute('data-theme');
        localStorage.setItem('haitun-theme', 'dark');
      } else {
        document.body.setAttribute('data-theme', 'light');
        localStorage.setItem('haitun-theme', 'light');
      }
    });

    // 优化系统识别逻辑，确保Linux正确匹配
    function detectOS() {
      const ua = navigator.userAgent.toLowerCase();
      if (/windows/.test(ua)) return 'windows';
      if (/mac os|macintosh/.test(ua)) return 'mac';
      if (/linux|x11/.test(ua)) return 'linux';
      return 'windows';
    }

    document.addEventListener('DOMContentLoaded', () => {
      const os = detectOS();
      // 给对应选项加「当前设备」标记
      document.querySelectorAll('.download-option').forEach(el => {
        if (el.dataset.os === os) {
          el.classList.add('current');
          const badge = document.createElement('span');
          badge.className = 'badge';
          badge.textContent = '当前设备';
          el.appendChild(badge);
        }
      });

      // Hero主按钮点击：自动触发当前系统下载
      const heroDownloadBtn = document.getElementById('hero-download-main');
      if (heroDownloadBtn) {
        heroDownloadBtn.addEventListener('click', (e) => {
          e.preventDefault();
          const target = document.querySelector(`.download-option[data-os="${os}"]`);
          if (target) {
            window.open(target.href, '_blank');
          }
        });
      }
    });
  </script>
</body>
</html>
