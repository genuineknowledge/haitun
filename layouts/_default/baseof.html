<!DOCTYPE html>
<html lang="{{ .Site.Language.Locale | default "zh-CN" }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .Site.Title }} · {{ .Site.Params.tagline }}</title>
  <meta name="description" content="{{ .Site.Params.description }}">
  <link rel="icon" href="{{ "favicon.ico" | relURL }}" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  {{ $style := resources.Get "css/main.css" | resources.Minify }}
  <link rel="stylesheet" href="{{ $style.RelPermalink }}">
</head>
<body>
  <header class="nav">
    <div class="container nav-inner">
      <a class="logo" href="{{ "/" | relURL }}">
        <img class="logo-mark" src="{{ "logo.png" | relURL }}" alt="{{ .Site.Params.brand }}">{{ .Site.Params.brand }}
      </a>
      <nav class="nav-links">
        <a href="#features">功能</a>
        <a href="#how">如何使用</a>
        <a href="#faq">常见问题</a>
        <!-- 主题切换按钮 -->
        <button id="themeToggle" class="theme-toggle" aria-label="切换明暗主题">
          <span class="icon-sun">☀️</span>
          <span class="icon-moon">🌙</span>
        </button>
        <a class="btn btn-sm" href="#start">下载</a>
      </nav>
    </div>
  </header>

  <main>
    {{ block "main" . }}{{ end }}
  </main>

  <footer class="footer">
    <div class="container footer-inner">
      <div>
        <div class="logo"><img class="logo-mark" src="{{ "logo.png" | relURL }}" alt="{{ .Site.Params.brand }}">{{ .Site.Params.brand }}</div>
        <p class="muted">{{ .Site.Params.description }}</p>
      </div>
      <div class="footer-links">
        <a href="https://github.com/{{ .Site.Params.github.owner }}/{{ .Site.Params.github.repo }}">GitHub</a>
        <a href="mailto:{{ .Site.Params.contactEmail }}">联系我们</a>
      </div>
    </div>
    <div class="container muted copyright">© {{ .Site.Params.year }} 合肥真知人工智能应用软件有限公司 保留所有权利。</div>
  </footer>

  <!-- 主题切换脚本 -->
  <script>
    const themeToggle = document.getElementById('themeToggle');
    const savedTheme = localStorage.getItem('haitun-theme');
    
    // 初始化主题：读取本地存储的选择
    if (savedTheme === 'light') {
      document.body.setAttribute('data-theme', 'light');
    }

    // 点击切换主题，同时保存偏好
    themeToggle.addEventListener('click', () => {
      const currentTheme = document.body.getAttribute('data-theme');
      if (currentTheme === 'light') {
        document.body.removeAttribute('data-theme');
        localStorage.setItem('haitun-theme', 'dark');
      } else {
        document.body.setAttribute('data-theme', 'light');
        localStorage.setItem('haitun-theme', 'light');
      }
    });
  </script>
</body>
</html>
