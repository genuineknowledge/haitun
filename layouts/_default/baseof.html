<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HaiTun 本地AI智能体</title>
  <meta name="description" content="真知智能出品的全场景本地AI智能体，自主执行任务、交付落地成果">
  <link rel="icon" href="{{ "favicon.ico" | relURL }}" type="image/x-icon">
  <!-- 科技感字体 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&display=swap" rel="stylesheet">
  {{ $style := resources.Get "css/main.css" | resources.Minify }}
  <link rel="stylesheet" href="{{ $style.RelPermalink }}">
</head>
<body class="is-download-page" id="top">
  <header class="nav">
    <div class="container nav-inner">
      <a class="logo" href="#top">
        <img class="logo-mark" src="{{ "logo.png" | relURL }}" alt="HaiTun">
        <span class="logo-text">HaiTun</span>
      </a>

      <!-- 汉堡按钮（仅移动端显示） -->
      <button id="menuToggle" class="menu-toggle" aria-label="打开菜单">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <!-- PC端导航 -->
      <nav class="nav-links">
        <a href="#requirements" data-zh="配置要求" data-en="Requirements">配置要求</a>
        <a href="#faq" data-zh="常见问题" data-en="FAQ">常见问题</a>
        <button id="langToggle" class="lang-toggle" aria-label="切换语言">
          <span class="lang-zh">中</span> / <span class="lang-en">En</span>
        </button>
        <a class="btn btn-sm" href="#top" data-zh="下载中心" data-en="Download">下载中心</a>
      </nav>
    </div>

    <!-- 移动端下拉菜单 -->
    <div id="mobileMenu" class="mobile-menu">
      <a href="#features" data-zh="功能" data-en="Features">功能</a>
      <a href="#requirements" data-zh="配置要求" data-en="Requirements">配置要求</a>
      <a href="#faq" data-zh="常见问题" data-en="FAQ">常见问题</a>
    </div>
  </header>

  <main>
    {{ block "main" . }}{{ end }}
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-inner">
        <div>
          <a class="logo footer-logo" href="#top">
            <img class="logo-mark" src="{{ "logo.png" | relURL }}" alt="HaiTun">
            <span class="logo-text">HaiTun</span>
          </a>
          <p data-zh="真知智能 融合打造的AI智能体。不是聊天机器人、不止辅助编码，是可自主执行任务、交付落地成果的可靠数字搭档；安全可控、持续自进化、使用成本更低，越用越聪明。"
             data-en="Co-created by Genuine Knowledge. Not just a chatbot, not just a coding assistant — a reliable digital partner that autonomously executes tasks and delivers tangible results. Secure & controllable, continuously self-evolving, lower cost, and gets smarter with use.">
            真知智能 融合打造的AI智能体。不是聊天机器人、不止辅助编码，是可自主执行任务、交付落地成果的可靠数字搭档；安全可控、持续自进化、使用成本更低，越用越聪明。
          </p>
        </div>

        <div class="footer-links">
          <a href="https://github.com/genuineknowledge/psi-agent" target="_blank" rel="noopener" data-zh="GitHub 仓库" data-en="GitHub Repository">GitHub 仓库</a>
          <a href="https://www.genuineknowledge.cn/" target="_blank" rel="noopener" data-zh="真知官网" data-en="Official Site">真知官网</a>
        </div>
      </div>
      <div class="copyright">
        © 2026 合肥真知人工智能应用软件有限公司 保留所有权利。
      </div>
    </div>
  </footer>

  <script>
    // ========== 中英文切换 ==========
    const langToggle = document.getElementById('langToggle');
    const savedLang = localStorage.getItem('haitun-lang') || 'zh';
    let rotatorTimer = null;

    function switchLang(lang) {
      document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
      document.querySelectorAll('[data-zh]').forEach(el => {
        el.textContent = lang === 'zh' ? el.dataset.zh : el.dataset.en;
      });
      localStorage.setItem('haitun-lang', lang);
      
      // 切换语言后同步刷新标题滚动词
      if (window.updateRotator) {
        window.updateRotator();
      }
    }

    // 初始化语言
    switchLang(savedLang);

    langToggle.addEventListener('click', () => {
      const current = document.documentElement.lang.startsWith('zh') ? 'zh' : 'en';
      const next = current === 'zh' ? 'en' : 'zh';
      switchLang(next);
    });

    // ========== 系统识别与主按钮适配 ==========
    function detectOS() {
      const ua = navigator.userAgent.toLowerCase();
      if (/windows|win/.test(ua)) return 'windows';
      if (/mac|macintosh/.test(ua)) return 'mac';
      if (/linux|x11|ubuntu/.test(ua)) return 'linux';
      return 'windows';
    }

    document.addEventListener('DOMContentLoaded', () => {
      const os = detectOS();
      const mainBtn = document.getElementById('mainDownloadBtn');
      const btnText = mainBtn.querySelector('.btn-text');
      const windowsUrl = mainBtn.dataset.windowsUrl;
      const versionInfo = document.querySelector('.download-version-info');

      // 根据系统更新主按钮文案与行为
      if (os === 'windows') {
        btnText.dataset.zh = 'Windows 版一键安装';
        btnText.dataset.en = 'One-click Install for Windows';
        versionInfo.dataset.zh = '一键安装，免费可用';
        versionInfo.dataset.en = 'One-click install, free to use';
        mainBtn.addEventListener('click', () => {
          window.open(windowsUrl, '_blank');
        });
        document.querySelector('.platform-windows').style.display = 'none';
      } else if (os === 'mac') {
        btnText.dataset.zh = 'macOS 版一键安装';
        btnText.dataset.en = 'One-click Install for macOS';
        versionInfo.dataset.zh = '一键安装，免费可用';
        versionInfo.dataset.en = 'One-click install, free to use';
        mainBtn.addEventListener('click', (e) => {
          e.preventDefault();
          document.getElementById('terminal-install').scrollIntoView({ behavior: 'smooth' });
        });
        document.querySelector('.platform-macos').style.display = 'none';
      } else if (os === 'linux') {
        btnText.dataset.zh = 'Linux 版一键安装';
        btnText.dataset.en = 'One-click Install for Linux';
        versionInfo.dataset.zh = '一键安装，免费可用';
        versionInfo.dataset.en = 'One-click install, free to use';
        mainBtn.addEventListener('click', (e) => {
          e.preventDefault();
          document.getElementById('terminal-install').scrollIntoView({ behavior: 'smooth' });
        });
        document.querySelector('.platform-linux').style.display = 'none';
      }

      // 重新应用当前语言，刷新按钮文案
      const currentLang = document.documentElement.lang.startsWith('zh') ? 'zh' : 'en';
      switchLang(currentLang);

      // mac和Linux平台按钮点击滚动到终端安装
      document.querySelectorAll('.platform-macos, .platform-linux').forEach(item => {
        item.addEventListener('click', (e) => {
          e.preventDefault();
          document.getElementById('terminal-install').scrollIntoView({ behavior: 'smooth' });
        });
      });

      // 终端命令切换逻辑
      const tabs = document.querySelectorAll('.terminal-tab');
      const cmdBox = document.getElementById('terminal-command');
      const copyBtn = document.getElementById('copyCommandBtn');
      if (tabs.length && cmdBox) {
        tabs.forEach(tab => {
          tab.addEventListener('click', () => {
            tabs.forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            cmdBox.textContent = tab.dataset.cmd;
          });
        });
      }

      // 复制按钮逻辑
      if (copyBtn && cmdBox) {
        copyBtn.addEventListener('click', async () => {
          const copyText = cmdBox.textContent;
          try {
            await navigator.clipboard.writeText(copyText);
            const originHtml = copyBtn.innerHTML;
            copyBtn.innerHTML = '<span style="font-size:12px;">已复制</span>';
            setTimeout(() => copyBtn.innerHTML = originHtml, 1500);
          } catch (err) {
            const tempTextarea = document.createElement('textarea');
            tempTextarea.value = copyText;
            tempTextarea.style.position = 'fixed';
            tempTextarea.style.left = '-9999px';
            document.body.appendChild(tempTextarea);
            tempTextarea.select();
            document.execCommand('copy');
            document.body.removeChild(tempTextarea);
            const originHtml = copyBtn.innerHTML;
            copyBtn.innerHTML = '<span style="font-size:12px;">已复制</span>';
            setTimeout(() => copyBtn.innerHTML = originHtml, 1500);
          }
        });
      }

      // 标题文字滚动切换（支持语言同步）
      const rotator = document.getElementById('heroWordRotator');
      if (rotator) {
        const wordsZh = ['写报告', '做分析', '写代码', '做项目'];
        const wordsEn = ['reports', 'analysis', 'code', 'program'];
        let current = 0;
        
        function getWords() {
          return document.documentElement.lang.startsWith('zh') ? wordsZh : wordsEn;
        }
        
        // 暴露到全局，供语言切换时调用
        window.updateRotator = function() {
          const words = getWords();
          // 防止索引越界
          if (current >= words.length) current = 0;
          rotator.textContent = words[current];
        };
        
        function rotateWord() {
          rotator.classList.add('animating');
          rotator.addEventListener('animationend', function onOutEnd() {
            rotator.removeEventListener('animationend', onOutEnd);
            rotator.classList.remove('animating');
            current = (current + 1) % getWords().length;
            rotator.textContent = getWords()[current];
            void rotator.offsetWidth;
            rotator.classList.add('animating-in');
            rotator.addEventListener('animationend', function onInEnd() {
              rotator.removeEventListener('animationend', onInEnd);
              rotator.classList.remove('animating-in');
            }, { once: true });
          }, { once: true });
        }

        window.updateRotator();
        rotatorTimer = setInterval(rotateWord, 1300);
      }

      // 移动端汉堡菜单
      const menuToggle = document.getElementById('menuToggle');
      const mobileMenu = document.getElementById('mobileMenu');
      if (menuToggle && mobileMenu) {
        menuToggle.addEventListener('click', () => {
          mobileMenu.classList.toggle('open');
        });
        mobileMenu.querySelectorAll('a').forEach(link => {
          link.addEventListener('click', () => {
            mobileMenu.classList.remove('open');
          });
        });
      }

      // 平滑滚动锚点
      document.querySelectorAll('a[href^="#"]').forEach(anchor => {
        anchor.addEventListener('click', function (e) {
          e.preventDefault();
          const target = document.querySelector(this.getAttribute('href'));
          if (target) {
            target.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }
        });
      });
    });
  </script>
</body>
</html>
