<!DOCTYPE html>
<html lang="{{ .Site.Language.Locale | default "zh-CN" }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .Site.Title }} · {{ .Site.Params.tagline }}</title>
  <meta name="description" content="{{ .Site.Params.description }}">
  <link rel="icon" href="{{ "favicon.ico" | relURL }}" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  {{ $style := resources.Get "css/main.css" | resources.Minify }}
  <link rel="stylesheet" href="{{ $style.RelPermalink }}">
  <style>
    /* ========== 导航布局 ========== */
    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }
    header .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: default;
      flex-shrink: 0;
    }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 32px;
    }
    .footer .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: default;
    }

    /* ========== Hero 下拉菜单（首页用） ========== */
    .hero,
    .hero-inner,
    .hero-cta,
    .hero-glow {
      overflow: visible !important;
    }
    .download-dropdown {
      position: relative;
      display: inline-block;
      z-index: 99999 !important;
    }
    .download-dropdown-menu {
      position: absolute;
      top: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      min-width: 320px;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.15);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: all 0.2s ease;
      z-index: 99999 !important;
      overflow: hidden;
    }
    .download-dropdown:hover .download-dropdown-menu {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }
    .download-option {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      color: #1f2937;
      text-decoration: none;
      font-size: 15px;
      line-height: 1.4;
      transition: background 0.15s;
      width: 100%;
      box-sizing: border-box;
      text-align: left;
    }
    .download-option:hover {
      background: #f3f4f6;
    }
    .download-option.current {
      color: #2588f0;
      font-weight: 600;
    }
    .download-option .badge {
      flex-shrink: 0;
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 6px;
      background: #e6f0ff;
      color: #2588f0;
      margin-left: 16px;
      font-weight: 500;
    }

    /* ========== 首页终端安装模块 ========== */
    .hero-terminal {
      margin-top: 36px;
      width: 100%;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
      text-align: left;
    }
    .terminal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .terminal-title {
      font-size: 14px;
      font-weight: 600;
      color: #374151;
    }
    .terminal-tip {
      font-size: 12px;
      color: #9ca3af;
    }
    .terminal-tabs {
      display: flex;
      gap: 2px;
      margin-bottom: 0;
      border-bottom: 1px solid #e5e7eb;
    }
    .terminal-tab {
      background: transparent;
      border: none;
      padding: 8px 14px;
      font-size: 13px;
      color: #6b7280;
      cursor: pointer;
      border-radius: 6px 6px 0 0;
      transition: all 0.15s;
    }
    .terminal-tab.active {
      color: #2588f0;
      background: rgba(37, 136, 240, 0.08);
      font-weight: 500;
    }
    .terminal-code-box {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-top: none;
      border-radius: 0 0 10px 10px;
      padding: 14px 18px;
      font-family: 'JetBrains Mono', Consolas, Monaco, monospace;
      font-size: 14px;
      color: #1f2937;
    }
    .terminal-code-box code {
      flex: 1;
      overflow-x: auto;
      white-space: nowrap;
    }
    .copy-btn {
      flex-shrink: 0;
      background: transparent;
      border: none;
      color: #6b7280;
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .copy-btn:hover {
      color: #2588f0;
      background: #e6f0ff;
    }
    .terminal-footer {
      margin: 10px 0 0;
      font-size: 12px;
      color: #9ca3af;
      text-align: center;
    }
    .terminal-footer code {
      font-family: inherit;
      background: #f3f4f6;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 12px;
      color: #4b5563;
    }

    /* ========== 下载专区三卡片 ========== */
    .download-grid {
      display: grid;
      grid-template-columns: 1fr 1.2fr 1fr;
      gap: 24px;
      margin-top: 40px;
      align-items: stretch;
    }
    .download-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 32px 24px;
      text-align: center;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .download-card:hover {
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      transform: translateY(-2px);
    }
    .download-card.featured {
      border-color: #2588f0;
      box-shadow: 0 4px 16px rgba(37, 136, 240, 0.15);
    }
    .download-card-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    .download-card h3 {
      font-size: 24px;
      margin: 0 0 8px;
      color: #1f2937;
    }
    .download-card .system-note {
      color: #6b7280;
      font-size: 14px;
      margin-bottom: 24px;
    }
    .download-card .btn {
      width: 100%;
      justify-content: center;
    }

    /* ========== 紧凑三步流程 ========== */
    .steps-compact {
      display: flex;
      gap: 32px;
      margin-bottom: 32px;
    }
    .step-compact {
      flex: 1;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .step-compact-num {
      flex-shrink: 0;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, #2588f0, #6b5cff);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      margin-top: 2px;
    }
    .step-compact h4 {
      margin: 0 0 4px;
      font-size: 16px;
      color: #1f2937;
    }
    .step-compact p {
      margin: 0;
      font-size: 13px;
      line-height: 1.5;
      color: #6b7280;
    }

    /* ========== 下载中心页面专属样式 ========== */
    .download-page-hero {
      position: relative;
      min-height: calc(100vh - 80px);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #2563eb 100%);
    }
    /* 科技感网格背景 */
    .download-page-hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
      pointer-events: none;
    }
    /* 发光光晕 */
    .download-page-hero::after {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 800px;
      height: 800px;
      background: radial-gradient(circle, rgba(37, 136, 240, 0.3) 0%, transparent 70%);
      pointer-events: none;
    }
    .download-page-content {
      position: relative;
      z-index: 2;
      text-align: center;
      color: #fff;
      padding: 40px 20px;
    }
    .download-page-logo {
      width: 120px;
      height: 120px;
      margin: 0 auto 24px;
      filter: drop-shadow(0 8px 24px rgba(0,0,0,0.3));
    }
    .download-page-title {
      font-size: 48px;
      font-weight: 700;
      margin: 0 0 12px;
      line-height: 1.2;
    }
    .download-page-subtitle {
      font-size: 18px;
      opacity: 0.85;
      margin: 0 0 40px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }
    .main-download-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 20px 60px;
      font-size: 22px;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, #6b5cff 0%, #2588f0 100%);
      border-radius: 999px;
      text-decoration: none;
      box-shadow: 0 12px 40px rgba(37, 136, 240, 0.4);
      transition: all 0.3s ease;
      border: none;
      cursor: pointer;
    }
    .main-download-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 48px rgba(37, 136, 240, 0.5);
    }
    .main-download-btn svg {
      width: 28px;
      height: 28px;
    }
    .download-version-info {
      margin-top: 16px;
      font-size: 14px;
      opacity: 0.75;
    }
    .download-more-link {
      display: inline-block;
      margin-top: 12px;
      color: #fff;
      opacity: 0.85;
      font-size: 15px;
      text-decoration: none;
      border-bottom: 1px solid rgba(255,255,255,0.3);
      transition: all 0.2s;
    }
    .download-more-link:hover {
      opacity: 1;
      border-color: rgba(255,255,255,0.8);
    }
    .platform-list {
      display: flex;
      justify-content: center;
      gap: 48px;
      margin-top: 60px;
      flex-wrap: wrap;
    }
    .platform-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      transition: all 0.2s;
      font-size: 15px;
    }
    .platform-item:hover {
      color: #fff;
      transform: translateY(-2px);
    }
    .platform-item-icon {
      font-size: 28px;
      opacity: 0.9;
    }

    /* ========== 暗色模式适配 ========== */
    body:not([data-theme="light"]) .download-dropdown-menu {
      background: #1f2937;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.5);
      border: 1px solid #374151;
    }
    body:not([data-theme="light"]) .download-option {
      color: #e5e7eb;
    }
    body:not([data-theme="light"]) .download-option:hover {
      background: #374151;
    }
    body:not([data-theme="light"]) .download-option.current {
      color: #60a5fa;
    }
    body:not([data-theme="light"]) .download-option .badge {
      background: #1e3a5f;
      color: #60a5fa;
    }
    body:not([data-theme="light"]) .download-card {
      background: #1f2937;
      border-color: #374151;
    }
    body:not([data-theme="light"]) .download-card.featured {
      border-color: #3b82f6;
      box-shadow: 0 4px 16px rgba(59, 130, 246, 0.2);
    }
    body:not([data-theme="light"]) .download-card h3 {
      color: #f9fafb;
    }
    body:not([data-theme="light"]) .download-card .system-note {
      color: #9ca3af;
    }
    body:not([data-theme="light"]) .step-compact h4 {
      color: #f9fafb;
    }
    body:not([data-theme="light"]) .step-compact p {
      color: #9ca3af;
    }
    body:not([data-theme="light"]) .terminal-title {
      color: #e5e7eb;
    }
    body:not([data-theme="light"]) .terminal-tip {
      color: #6b7280;
    }
    body:not([data-theme="light"]) .terminal-tabs {
      border-color: #374151;
    }
    body:not([data-theme="light"]) .terminal-tab {
      color: #9ca3af;
    }
    body:not([data-theme="light"]) .terminal-tab.active {
      color: #60a5fa;
      background: rgba(96, 165, 250, 0.15);
    }
    body:not([data-theme="light"]) .terminal-code-box {
      background: #1f2937;
      border-color: #374151;
      color: #e5e7eb;
    }
    body:not([data-theme="light"]) .copy-btn {
      color: #9ca3af;
    }
    body:not([data-theme="light"]) .copy-btn:hover {
      color: #60a5fa;
      background: #1e3a5f;
    }
    body:not([data-theme="light"]) .terminal-footer {
      color: #6b7280;
    }
    body:not([data-theme="light"]) .terminal-footer code {
      background: #374151;
      color: #d1d5db;
    }

    /* ========== 响应式 ========== */
    @media (max-width: 900px) {
      .download-grid {
        grid-template-columns: 1fr;
      }
      .steps-compact {
        flex-direction: column;
        gap: 16px;
      }
      .download-page-title {
        font-size: 32px;
      }
      .main-download-btn {
        padding: 16px 40px;
        font-size: 18px;
      }
      .platform-list {
        gap: 24px;
      }
    }
  </style>
</head>
<body>
  <header class="nav">
    <div class="container nav-inner">
      <div class="logo">
        <img class="logo-mark" src="{{ "logo.png" | relURL }}" alt="{{ .Site.Params.brand }}">
        <span class="logo-text">{{ .Site.Params.brand }}</span>
      </div>
      <nav class="nav-links">
        <a href="{{ "/" | relURL }}#features">功能</a>
        <a href="{{ "/" | relURL }}#requirements">配置要求</a>
        <a href="{{ "/" | relURL }}#faq">常见问题</a>
        <button id="themeToggle" class="theme-toggle" aria-label="切换明暗主题">
          <span class="icon-sun">☀️</span>
          <span class="icon-moon">🌙</span>
        </button>
        <!-- 右上角下载中心：跳转独立下载页 -->
        <a class="btn btn-sm" href="{{ "/download" | relURL }}">下载中心</a>
      </nav>
    </div>
  </header>

  <main>
    {{ block "main" . }}{{ end }}
  </main>

  <footer class="footer">
    <div class="container footer-inner">
      <div>
        <div class="logo">
          <img class="logo-mark" src="{{ "logo.png" | relURL }}" alt="{{ .Site.Params.brand }}">
          <span class="logo-text">{{ .Site.Params.brand }}</span>
        </div>
        <p class="muted">{{ .Site.Params.description }}</p>
      </div>
      <div class="footer-links">
        <a href="https://github.com/genuineknowledge/psi-agent" target="_blank">GitHub</a>
        <a href="http://www.genuine-knowledge.com/" target="_blank">联系我们</a>
      </div>
    </div>
    <div class="container muted copyright">© {{ .Site.Params.year }} 合肥真知人工智能应用软件有限公司 保留所有权利。</div>
  </footer>

  <script>
    // 主题切换
    const themeToggle = document.getElementById('themeToggle');
    const savedTheme = localStorage.getItem('haitun-theme');
    if (savedTheme === 'light') {
      document.body.setAttribute('data-theme', 'light');
    }
    themeToggle.addEventListener('click', () => {
      const currentTheme = document.body.getAttribute('data-theme');
      if (currentTheme === 'light') {
        document.body.removeAttribute('data-theme');
        localStorage.setItem('haitun-theme', 'dark');
      } else {
        document.body.setAttribute('data-theme', 'light');
        localStorage.setItem('haitun-theme', 'light');
      }
    });

    // 系统识别
    function detectOS() {
      const ua = navigator.userAgent.toLowerCase();
      if (/windows|win/.test(ua)) return 'windows';
      if (/mac os|macintosh/.test(ua)) return 'mac';
      if (/linux|x11|ubuntu|debian|fedora/.test(ua)) return 'linux';
      return 'windows';
    }

    document.addEventListener('DOMContentLoaded', () => {
      const os = detectOS();

      // 首页下拉菜单标记当前设备
      document.querySelectorAll('.download-option').forEach(el => {
        if (el.dataset.os === os) {
          el.classList.add('current');
          const badge = document.createElement('span');
          badge.className = 'badge';
          badge.textContent = '当前设备';
          el.appendChild(badge);
        }
      });

      // Hero 主按钮点击自动匹配下载
      const heroDownloadBtn = document.getElementById('hero-download-main');
      if (heroDownloadBtn) {
        heroDownloadBtn.addEventListener('click', (e) => {
          e.preventDefault();
          const target = document.querySelector(`.download-option[data-os="${os}"]`);
          if (target) {
            window.open(target.href, '_blank');
          }
        });
      }

      // 终端命令切换 + 复制
      const tabs = document.querySelectorAll('.terminal-tab');
      const commandEl = document.getElementById('terminal-command');
      const copyBtn = document.getElementById('copyCommandBtn');
      
      if (tabs.length && commandEl) {
        tabs.forEach(tab => {
          tab.addEventListener('click', () => {
            tabs.forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            commandEl.textContent = tab.dataset.cmd;
          });
        });
      }
      
      if (copyBtn && commandEl) {
        copyBtn.addEventListener('click', async () => {
          try {
            await navigator.clipboard.writeText(commandEl.textContent);
            const originalIcon = copyBtn.innerHTML;
            copyBtn.innerHTML = '<span style="font-size:12px;">已复制</span>';
            setTimeout(() => {
              copyBtn.innerHTML = originalIcon;
            }, 1500);
          } catch (err) {
            console.error('复制失败', err);
          }
        });
      }
    });
  </script>
</body>
</html>
