<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "zh-CN" }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .Title }} | {{ .Site.Title }}</title>
  <meta name="description" content="{{ .Site.Params.description }}">
  <link rel="icon" href="{{ "favicon.ico" | relURL }}" type="image/x-icon">
  {{ $style := resources.Get "css/main.css" | resources.Minify }}
  <link rel="stylesheet" href="{{ $style.RelPermalink }}">
</head>
<body>
  <header class="nav">
    <div class="container nav-inner">
      <div class="logo">
        <img class="logo-mark" src="{{ "logo.png" | relURL }}" alt="{{ .Site.Params.brand }}">
        <span class="logo-text">{{ .Site.Params.brand }}</span>
      </div>
      <nav class="nav-links">
        <a href="{{ "/detail/" | relURL }}#features">功能</a>
        <a href="{{ "/detail/" | relURL }}#requirements">配置要求</a>
        <a href="{{ "/detail/" | relURL }}#faq">常见问题</a>
        <button id="themeToggle" class="theme-toggle" aria-label="切换明暗主题">
          <span class="icon-sun">☀️</span>
          <span class="icon-moon">🌙</span>
        </button>
        <a class="btn btn-sm" href="{{ "/" | relURL }}">下载中心</a>
      </nav>
    </div>
  </header>

  <main>
    {{ block "main" . }}{{ end }}
  </main>

  <footer class="footer">
    <div class="container footer-inner">
      <div>
        <div class="logo">
          <img class="logo-mark" src="{{ "logo.png" | relURL }}" alt="{{ .Site.Params.brand }}">
          <span class="logo-text">{{ .Site.Params.brand }}</span>
        </div>
        <p class="muted">{{ .Site.Params.description }}</p>
      </div>
      <div class="footer-links">
        <a href="https://github.com/genuineknowledge/psi-agent" target="_blank">GitHub 仓库</a>
        <a href="https://www.genuine-knowledge.com" target="_blank">真知官网</a>
      </div>
    </div>
    <div class="container muted copyright">
      © {{ .Site.Params.year }} 合肥真知人工智能应用软件有限公司 保留所有权利。
    </div>
  </footer>

  <script>
    // 明暗主题持久化
    const themeToggle = document.getElementById('themeToggle');
    const savedTheme = localStorage.getItem('haitun-theme');
    if (savedTheme === 'light') {
      document.body.setAttribute('data-theme', 'light');
    }
    themeToggle.addEventListener('click', () => {
      const current = document.body.getAttribute('data-theme');
      if (current === 'light') {
        document.body.removeAttribute('data-theme');
        localStorage.setItem('haitun-theme', 'dark');
      } else {
        document.body.setAttribute('data-theme', 'light');
        localStorage.setItem('haitun-theme', 'light');
      }
    });

    // 系统自动识别
    function detectOS() {
      const ua = navigator.userAgent.toLowerCase();
      if (/windows|win/.test(ua)) return 'windows';
      if (/mac|macintosh/.test(ua)) return 'mac';
      if (/linux|x11|ubuntu/.test(ua)) return 'linux';
      return 'windows';
    }

    document.addEventListener('DOMContentLoaded', () => {
      const os = detectOS();

      // 下拉菜单标记当前设备
      document.querySelectorAll('.download-option').forEach(item => {
        if (item.dataset.os === os) {
          item.classList.add('current');
          const badge = document.createElement('span');
          badge.className = 'badge';
          badge.textContent = '当前设备';
          item.appendChild(badge);
        }
      });

      // 主下载按钮自动匹配系统下载链接
      const heroDownloadBtn = document.getElementById('hero-download-main');
      if (heroDownloadBtn) {
        heroDownloadBtn.addEventListener('click', (e) => {
          e.preventDefault();
          const target = document.querySelector(`.download-option[data-os="${os}"]`);
          if (target) window.open(target.href, '_blank');
        });
      }

      // 终端命令切换逻辑
      const tabs = document.querySelectorAll('.terminal-tab');
      const cmdBox = document.getElementById('terminal-command');
      const copyBtn = document.getElementById('copyCommandBtn');
      if (tabs.length && cmdBox) {
        tabs.forEach(tab => {
          tab.addEventListener('click', () => {
            tabs.forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            cmdBox.textContent = tab.dataset.cmd;
          });
        });
      }

      // 复制按钮交互
      if (copyBtn && cmdBox) {
        copyBtn.addEventListener('click', async () => {
          try {
            await navigator.clipboard.writeText(cmdBox.textContent);
            const originHtml = copyBtn.innerHTML;
            copyBtn.innerHTML = '<span style="font-size:12px;">已复制</span>';
            setTimeout(() => copyBtn.innerHTML = originHtml, 1500);
          } catch (err) {
            console.error('复制命令失败', err);
          }
        });
      }

      // 大标题文字滚动切换（修复版）
      const rotator = document.getElementById('heroWordRotator');
      if (rotator) {
        const words = ['写代码', '做设计', '写报告', '做分析'];
        let current = 0;
        rotator.textContent = words[current];

        function rotateWord() {
          // 向上滑出动画
          rotator.classList.add('animating');

          rotator.addEventListener('animationend', function onOutEnd() {
            rotator.removeEventListener('animationend', onOutEnd);
            rotator.classList.remove('animating');

            current = (current + 1) % words.length;
            rotator.textContent = words[current];

            // 强制回流，确保下一次动画能被识别
            void rotator.offsetWidth;

            // 向下滑入动画
            rotator.classList.add('animating-in');

            rotator.addEventListener('animationend', function onInEnd() {
              rotator.removeEventListener('animationend', onInEnd);
              rotator.classList.remove('animating-in');
            }, { once: true });
          }, { once: true });
        }

        setInterval(rotateWord, 2000);
      }
    });
  </script>
</body>
</html>
