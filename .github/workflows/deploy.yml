# GitHub Actions：push 到 main 时自动构建 Hugo 并部署到 GitHub Pages
name: Deploy Hugo site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:   # 允许在 Actions 页面手动触发

# 授予 GITHUB_TOKEN 部署 Pages 所需权限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只跑一个部署
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: 安装 Hugo Extended
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.163.3"
          extended: true

      - name: 配置 Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          # 仓库未手动开启 Pages 时，自动启用（避免 "Get Pages site failed"）
          enablement: true

      - name: 构建站点
        # baseURL 由 Pages 自动注入，确保资源路径正确
        run: hugo --gc --minify --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: 上传构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
