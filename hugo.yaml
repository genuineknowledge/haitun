# ============================================================
# Hugo 站点配置
# ============================================================
baseURL: "https://www.genuine-knowledge.com/haitun/"
locale: "zh-CN"
title: "Haitun Agent"

# 关闭用不到的输出类型
disableKinds:
  - taxonomy
  - term
  - rss

params:
  brand: "HaiTun"
  tagline: "你的本地 AI 智能体，自动完成长程复杂任务"
  description: "全程本地运行、数据隐私可控，支持长上下文稳定执行与持续自进化，把繁琐重复的工作交给它，专注真正重要的事。"

  # 下载配置（指向 GitHub Releases 最新版）
  github:
    owner: "genuineknowledge"
    repo: "haitun"
    assetName: "HaitunAgent_Setup.exe"

  # 页脚
  year: "2026"
  contactEmail: "team@example.com"
