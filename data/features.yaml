title: 核心能力
subtitle: 专为本地自动化打造，兼顾强大能力、隐私安全与稳定执行

items:
  - icon: "⚡"
    title: 智能任务自动化
    desc: 自动完成文件整理、数据清洗、格式转换、批量操作等重复性工作，替代繁琐人工流程，大幅提升执行效率。
  - icon: "🔒"
    title: 本地运行 · 隐私优先
    desc: 所有指令与数据全程留存本地设备，不上传任何云端服务器；代码完全开源，安全逻辑可自行审计验证。
  - icon: "🎯"
    title: 长程任务稳定执行
    desc: 支持长上下文、多步骤复杂任务，具备断点续跑与错误自修正能力，长流程任务也能稳定可靠落地。
  - icon: "🌱"
    title: 持续自进化迭代
    desc: 基于执行反馈自主优化任务策略，能力持续迭代升级，不断适配更多个性化场景与工作流需求。
