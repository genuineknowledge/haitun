# data/features.yaml
title: 核心能力
subtitle: 专为本地自动化打造，兼顾强大能力与隐私安全

items:
  - icon: "⚡"
    title: 智能任务自动化
    desc: 自动完成文件整理、数据清洗、格式转换、定时执行等重复性工作，替代繁琐人工操作，大幅提升效率。
  - icon: "🔒"
    title: 本地运行 · 隐私优先
    desc: 所有数据与指令全程留存在本地设备，不上传任何云端服务器；代码完全开源，安全逻辑可自行审计。
  - icon: "💬"
    title: 自然语言交互
    desc: 无需记忆复杂命令与配置，用日常说话的方式描述需求，智能体自动理解并执行，几分钟即可上手。
  - icon: "🧩"
    title: 可扩展插件生态
    desc: 支持通过插件与技能模块按需扩展能力，适配个性化工作流；社区持续迭代更新，功能不断进化。
