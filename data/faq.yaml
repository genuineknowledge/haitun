# 常见问题
items:
  - q: "支持哪些操作系统？"
    a: "目前提供 Windows 10/11 安装包。其他平台正在规划中。"
  - q: "需要联网吗？"
    a: "智能体本身在本地运行；部分需要调用在线模型或网络资源的功能会用到网络，其余功能可离线使用。"
  - q: "我的数据安全吗？"
    a: "数据默认全部保留在你的设备本地，不会上传到我们的服务器。"
  - q: "如何获取更新？"
    a: "新版本会发布到 GitHub Releases，网站的下载按钮始终指向最新版本，重新下载安装即可。"
  - q: "收费吗？"
    a: "当前免费提供。如有变动会在本页面和 GitHub 仓库说明。"
